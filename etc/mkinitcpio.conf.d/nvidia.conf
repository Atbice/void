# Installed to /etc/mkinitcpio.conf.d/nvidia.conf by bootstrap.sh.
# Bakes the NVIDIA modules into the initramfs so KMS comes up early — fixes
# black-screen-during-boot and ensures the proprietary driver owns the
# console before greetd starts.
#
# `mkinitcpio` merges MODULES= from every file under /etc/mkinitcpio.conf.d/
# with the array in /etc/mkinitcpio.conf, so this drop-in is additive and
# survives upstream changes to the main config file.
MODULES=(nvidia nvidia_modeset nvidia_uvm nvidia_drm)
