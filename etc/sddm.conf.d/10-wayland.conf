# Installed to /etc/sddm.conf.d/10-wayland.conf by bootstrap.sh.
# Runs the SDDM greeter itself on Wayland (KWin). Works on NVIDIA with the
# current driver. Recovery if it misbehaves (black screen / no greeter): from a
# TTY (Ctrl+Alt+F2), `sudo rm /etc/sddm.conf.d/10-wayland.conf; sudo sv restart
# sddm`. The Plasma *session* stays Wayland regardless of the greeter.
# NOTE: `--locale1` is intentionally NOT passed — Void has no systemd-localed
# provider, so it is a no-op. The greeter keymap is set explicitly via
# GreeterEnvironment below (XKB_DEFAULT_LAYOUT=se, Swedish) because the greeter
# process does not read /etc/environment. Change `se` to your layout if needed.
[General]
DisplayServer=wayland
GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=layer-shell,XKB_DEFAULT_LAYOUT=se

[Wayland]
CompositorCommand=kwin_wayland --drm --no-lockscreen --no-global-shortcuts
