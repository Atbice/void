# Installed to /etc/sddm.conf.d/10-wayland.conf by bootstrap.sh.
# Runs the SDDM greeter itself on Wayland (KWin). Works on NVIDIA with the
# current driver. If the greeter misbehaves, delete this file — the Plasma
# session stays Wayland regardless of the greeter's display server.
[General]
DisplayServer=wayland
GreeterEnvironment=QT_WAYLAND_SHELL_INTEGRATION=layer-shell

[Wayland]
CompositorCommand=kwin_wayland --drm --no-lockscreen --no-global-shortcuts --locale1
