# Gaming performance tuning. Installed + applied (sysctl --system) by bootstrap.sh.
# (zram's vm.swappiness/page-cluster live in 99-zram.conf — separate file.)

# THE important one: the default vm.max_map_count (65530) CRASHES / refuses to
# launch many modern games (CS2, UE5 titles, Hogwarts, Elden Ring, Star Citizen)
# that mmap huge numbers of regions. 1048576 is the Arch/Fedora/Ubuntu consensus.
# This is "won't run -> runs", not an FPS tweak. Bump a stubborn title's box to
# 2147483642 only if it still ENOMEMs.
vm.max_map_count=1048576

# Steam + Lutris + Faugus + KDE together can exhaust the default inotify instance
# cap (128); 8192 is cheap insurance. (max_user_watches auto-scales w/ RAM since 5.11.)
fs.inotify.max_user_instances=8192

# Cap dirty page-cache so a big background write (shader compile, game install)
# can't stall frame delivery. Setting *_bytes auto-zeros the *_ratio (exclusive).
vm.dirty_bytes=268435456
vm.dirty_background_bytes=67108864
vm.dirty_writeback_centisecs=1500
