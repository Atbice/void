# Tuning for zram swap (paired with the zramen service). Installed by
# bootstrap.sh, applied with `sysctl --system`.
# swappiness 180: zram swap is fast+compressed, so prefer it heavily over
#   reclaiming page cache (range is 0-200 on modern kernels).
# page-cluster 0: no swap readahead — pointless for a RAM-backed device.
vm.swappiness=180
vm.page-cluster=0
