# Installed to /etc/modprobe.d/nvidia.conf by bootstrap.sh.
# RTX 3090 — Wayland KMS + reliable suspend/resume without systemd nvidia units.
# Black screen at boot? fbdev=1 has a known 3090 regression on some driver builds.
# Recover: append `nvidia-drm.fbdev=0` at the GRUB cmdline, then drop fbdev=1 below
# and run `sudo xbps-reconfigure -fa`. modeset=1 alone is enough for KDE Wayland
# (fbdev is on by default in the 590+ driver anyway).
options nvidia-drm modeset=1 fbdev=1
options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_TemporaryFilePath=/var/tmp
