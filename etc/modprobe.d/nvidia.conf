# Installed to /etc/modprobe.d/nvidia.conf by bootstrap.sh.
# RTX 3090 — Wayland KMS + reliable suspend/resume on Artix runit (no
# systemd nvidia-suspend/resume.service to fall back on, so the kernel
# option below carries suspend state itself).
options nvidia-drm modeset=1 fbdev=1
options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_TemporaryFilePath=/var/tmp
